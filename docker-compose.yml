version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: hanoi
      POSTGRES_USER: hanoi
      POSTGRES_PASSWORD: hanoi
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hanoi:hanoi@db:5432/hanoi?schema=public
      AUTH_SECRET: super-secret-key-change-me
      APP_URL: http://localhost:3000
      VARIANTS_JSON_PATH: /app/data/variants.json
    command: sh -c "npx prisma migrate deploy && npx prisma db seed && node server.js"

volumes:
  postgres-data:
